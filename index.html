<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Store Page</title>
    <link rel="stylesheet" href="index.css" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z"
      crossorigin="anonymous"
    />
    <script
      src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
      integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
      integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"
      integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="book-store-home-page-bg-container">
      <h1 class="book-store-home-page-heading">Popular Book</h1>
      <div class="popular-card d-flex flex-row">
        <img
          src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/book-apj-img.png"
          class="popular-card-image"
        />
        <div class="popular-mini-card">
          <h1 class="popular-card-heading">Wings of Fire</h1>
          <p class="popular-card-para">An Autobiography of Abdul Kalam</p>
          <p class="popular-card-author">by Arun Tiwari</p>
          <button class="btn btn-primary">Read Now</button>
        </div>
      </div>
    
      <div class="recommended-books-card">
        <h1 class="recommended-books-card-heading">Recommended Books</h1>
        <div class="recommended-books-mini-card d-flex flex-row mb-3">
          <img
            src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/book-chetan-bhagat-img.png"
            class="recommended-books-mini-card-img"
          />
          <div class="recommended-books-text-card">
            <h1 class="recommended-books-text-card-heading">The 3 mistakes of my life</h1>
            <p class="recommended-books-card-description">Indian author <br>by Chetan Bhagat</p>
            <button class="recommended-books-card-button btn-primary">Read Now</button>
          </div>
        </div>
        <div class="recommended-books-mini-card d-flex flex-row">
          <img
            src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/harrypotter-img.png"
            class="recommended-books-mini-card-img"
          />
          <div class="recommended-books-text-card">
            <h1 class="recommended-books-text-card-heading">Harry Potter</h1>
            <p class="recommended-books-card-description">and the Sorcerer's Stone <br> by J.K.Rowling</p>
            <button class="recommended-books-card-button btn-primary">Read Now</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
